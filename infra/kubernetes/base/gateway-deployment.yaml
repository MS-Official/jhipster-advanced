apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-app
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway-app }
  template:
    metadata:
      labels: { app: gateway-app }
    spec:
      containers:
        - name: gateway-app
          image: your-org/platform-gateway:latest
          ports: [{containerPort: 8080}]
